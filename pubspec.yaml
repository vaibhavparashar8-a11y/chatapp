name: chatapp
description: Private 2-person chat app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # Calls — Agora (hosted, per-minute) and peer-to-peer WebRTC (free).
  # Which one runs is chosen at runtime by the `call_backend` Remote Config key.
  agora_rtc_engine: ^6.3.0
  # Must be 1.x: every 0.11.x still ships Flutter's removed v1-embedding
  # `PluginRegistry.Registrar`, which fails to compile on Flutter 3.44+.
  # It wants `web ^1.0.0`, which firebase_*_web 4.x/2.x cap below — resolved via
  # dependency_overrides below (safe: Android-only app, no web code compiles).
  flutter_webrtc: ^1.5.2

  # Media picking
  image_picker: ^1.0.7
  file_picker: ^8.0.0

  # UI helpers
  cached_network_image: ^3.3.1
  video_player: ^2.8.2
  chewie: ^1.7.4
  intl: ^0.19.0
  permission_handler: ^11.3.0
  path: ^1.9.0
  uuid: ^4.3.3
  open_file: ^3.3.2
  dio: ^5.4.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  firebase_remote_config: ^4.4.0
  firebase_messaging: ^14.9.4
  cloud_functions: ^4.6.0
  gal: ^1.1.0
  flutter_local_notifications: ^17.0.0
  flutter_timezone: ^5.1.0
  timezone: ^0.9.4
  device_info_plus: ^10.1.0
  call_log: ^6.0.1
  video_compress: ^3.1.2
  workmanager: ^0.9.0
  url_launcher: ^6.2.5

# flutter_webrtc needs `web ^1.0.0`; firebase_*_web (pinned at firebase_core 2.x
# / firebase_auth 4.x — migration deferred, issue #53) caps it below that.
# This app targets Android only (no web/ or ios/ directory), so the firebase web
# implementations are never compiled and the override is inert for our builds.
# Remove this once the Firebase packages are upgraded.
dependency_overrides:
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
