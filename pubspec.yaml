name: chatapp
description: Private 2-person chat app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # Agora calls
  agora_rtc_engine: ^6.3.0

  # Media picking
  image_picker: ^1.0.7
  file_picker: ^8.0.0

  # UI helpers
  cached_network_image: ^3.3.1
  video_player: ^2.8.2
  chewie: ^1.7.4
  intl: ^0.19.0
  permission_handler: ^11.3.0
  path: ^1.9.0
  uuid: ^4.3.3
  open_file: ^3.3.2
  dio: ^5.4.1
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  firebase_remote_config: ^4.4.0
  gal: ^1.1.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.0.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
